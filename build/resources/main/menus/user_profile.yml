user_profile:
  update-in-ticks: 20
  components:
    head:
      type: "TEXT"
      # PlaceHolderApi support
      text: "<yellow>%player_name%</yellow>"
      x: 0.0
      y: 1.0
      size: 2.0
    stats:
      type: "TEXT"
      text: "<gray>Ping: <green>%player_ping%ms<newline><gray>Health: <red>%player_health%"
      x: 0.0
      y: 0.0
      size: 1.0
    close_btn:
      type: "BUTTON"
      text: "<red>[ Close ]"
      x: 0.0
      y: -1.0
      size: 0.8
      actions:
        - "[close]"