animated_menu:
  components:
    logo:
      type: "ITEM"
      # Material only works for ITEMs and BLOCKs
      material: "NETHER_STAR"
      x: 0.0
      y: 1.0
      size: 1.0
      animations:
        # You can make animations with math formulas
        x-formula: "cos(t) * 0.5"
        y-formula: "sin(t) * 0.5"
        rotation-formula: "sin(t) * 20"
    animations:
      type: "TEXT"
      text: "<yellow>¡Animations!"
      x: 0.0
      y: 0.0
      size: 2.0
      animations:
        scale-formula: "1 + (abs(sin(t * 2)) * 0.2)"


    button_close:
      type: "BUTTON"
      x: 0
      y: -0.8
      size: 0.8
      text: "<red>Close menu"
      actions:
        - "[close]"